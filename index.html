<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Redirect</title>
</head>
<body>
    <script>
        // Pega a query string da URL (ex: ?url=...)
        const urlParams = new URLSearchParams(window.location.search);
        let url = urlParams.get("url");  // Pega o parâmetro "url"

        // Valida se o parâmetro existe e é uma URL
        if (url && url.startsWith("http://") || url.startsWith("https://")) {
            // Redireciona para o link de intenção
            window.location.href = `wvc-x-callback://open?url=${encodeURIComponent(url)}`;
        } else {
            // Trata caso não tenha parâmetro ou seja inválido
            console.error("URL não informada ou inválida.");
        }
    </script>
</body>
</html>
